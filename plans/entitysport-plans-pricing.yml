specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Entity Sport
providerId: entitysport
created: '2026-06-25'
modified: '2026-06-25'
reconciled: false
tags:
- Sports Data
- Cricket
- Live Scores
- Fantasy
- Odds
- Plans
description: >-
  Entity Sport sells the Cricket API V2 through tiered monthly/annual
  subscriptions that scale tournament coverage and data depth, plus
  commentary variants that add ball-by-ball commentary, and a custom
  Enterprise tier. A free development/trial tier is also offered. Plan
  inclusions and tournament coverage vary; exact feature-to-plan mappings
  are not fully reconciled in this artifact.
notes: >-
  Representative pricing as published on entitysport.com; verify current
  tier prices, tournament coverage, and feature inclusions on the pricing
  and plan-coverage pages during reconciliation.
sources:
- https://www.entitysport.com/cricket-api/
- https://www.entitysport.com/blog/cricket-api-plans-and-coverage-explained/
- https://www.doc.entitysport.com/cricket-api-v2
plans:
