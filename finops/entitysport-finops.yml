meters:
- name: subscription_tier
  description: Fixed monthly/annual subscription fee for the selected Cricket API plan tier.
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - plan
- name: commentary_addon
  description: Incremental fee for Commentary plan variants adding ball-by-ball commentary.
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - plan
- name: tournament_coverage
  description: Tournaments and competitions accessible under the subscribed plan.
  unit: tournaments
  aggregation: max
  dimensions:
  - account
  - plan
- name: enterprise_contract
  description: Negotiated Enterprise agreement for custom coverage, odds, and support.
  unit: contract
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track the active subscription tier and renewal term; map which tournaments and data types each plan unlocks.
- name: Allocation
  description: Attribute the subscription cost to the products/teams consuming cricket data; tag API credentials per workload.
- name: Optimization
  description: Right-size the tier to the tournaments and data depth actually needed; avoid Commentary variants unless ball-by-ball commentary is required.
- name: Accountability
  description: Review coverage vs. spend before each renewal; negotiate Enterprise terms when coverage or odds needs exceed standard tiers.
