description: >-
  FinOps view of Entity Sport Cricket API spend. Entity Sport bills via fixed
  monthly or annual subscription tiers (Starter, Pro, Elite, and their
  Commentary variants) plus a custom Enterprise tier, with tournament coverage
  and data depth scaling by plan. Cost is driven by tier selection rather than
  per-call metering; exact tier-to-coverage mappings are not fully reconciled.
notes: >-
  Subscription prices and coverage are subject to change; verify against the
  Entity Sport pricing and plan-coverage pages during reconciliation.
sources:
- https://www.entitysport.com/cricket-api/
- https://www.entitysport.com/blog/cricket-api-plans-and-coverage-explained/
